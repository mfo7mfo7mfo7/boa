services:
  boa:
    build:
      context: .
    image: ${BOA_IMAGE:-boa:local}
    container_name: boa
    environment:
      BOA_DB_PATH: /data/boa.db
      BOA_JOURNEY_FOLD_DAYS: ${BOA_JOURNEY_FOLD_DAYS:-15}
      BOA_SMTP_ENABLED: ${BOA_SMTP_ENABLED:-false}
      BOA_SMTP_HOST: ${BOA_SMTP_HOST:-}
      BOA_SMTP_PORT: ${BOA_SMTP_PORT:-587}
      BOA_SMTP_USERNAME: ${BOA_SMTP_USERNAME:-}
      BOA_SMTP_PASSWORD: ${BOA_SMTP_PASSWORD:-}
      BOA_SMTP_FROM: ${BOA_SMTP_FROM:-}
      BOA_SMTP_FROM_NAME: ${BOA_SMTP_FROM_NAME:-Boa}
      BOA_SMTP_STARTTLS: ${BOA_SMTP_STARTTLS:-true}
      BOA_SMTP_SSL: ${BOA_SMTP_SSL:-false}
      BOA_SMTP_TIMEOUT: ${BOA_SMTP_TIMEOUT:-15}
      BOA_SMTP_TEST_TO: ${BOA_SMTP_TEST_TO:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    ports:
      - "${BOA_PORT:-8000}:8000"
    volumes:
      - boa-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  boa-data:
