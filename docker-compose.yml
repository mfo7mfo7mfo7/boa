services:
  boa:
    build:
      context: .
    image: ${BOA_IMAGE:-boa:local}
    container_name: boa
    environment:
      BOA_DB_PATH: /data/boa.db
      BOA_JOURNEY_FOLD_DAYS: ${BOA_JOURNEY_FOLD_DAYS:-15}
    ports:
      - "${BOA_PORT:-8000}:8000"
    volumes:
      - boa-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  boa-data:
